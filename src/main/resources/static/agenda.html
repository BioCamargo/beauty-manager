<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Agenda</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Agenda do dia</h2>

<button onclick="carregarAgenda()" class="btn btn-primary">
Carregar Agenda
</button>

<table class="table mt-3">

<thead>

<tr>
<th>Hora</th>
<th>Cliente</th>
<th>Serviço</th>
</tr>

</thead>

<tbody id="agenda">

</tbody>

</table>

</div>

<script>

async function carregarAgenda(){

let token = localStorage.getItem("token")

let hoje = new Date().toISOString().split("T")[0]

let response = await fetch("/agendamentos/"+hoje,{

headers:{
"Authorization":"Bearer "+token
}

})

let dados = await response.json()

let tabela = document.getElementById("agenda")

tabela.innerHTML=""

dados.forEach(a=>{

tabela.innerHTML+=`
<tr>
<td>${a.hora}</td>
<td>${a.clienteId}</td>
<td>${a.servicoId}</td>
</tr>
`

})

}

</script>

</body>
</html>
