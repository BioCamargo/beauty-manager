<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Login - LUMORA</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">

                    <img src="Logo_LUMORA_menor.jpg" class="container-fluid"/>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Senha</label>
                        <input type="password" id="senha" class="form-control">
                    </div>

                    <button onclick="login()" class="btn btn-primary w-100">
                        Entrar
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    try {
        const response = await axios.post('/auth/login', {
            email: email,
            senha: senha
        });

        localStorage.setItem('token', response.data.token);
        localStorage.setItem('nome', response.data.nome);
        localStorage.setItem('empresa', response.data.empresa);

        window.location.href = '/dashboard.html';

    } catch (error) {
        alert(error.response?.data || 'Erro ao fazer login');
    }
}
</script>

</body>
</html>
